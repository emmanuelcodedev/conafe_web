<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Aspirantes</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="card shadow">
                    <div class="card-header text-center bg-primary text-white">
                        <h1 class="h4" >Registro de Aspirantes</h1>
                    </div>
                    <div class="card-body">
                        <!-- Formulario de registro -->
                        <form method="post" enctype="multipart/form-data" id="registroForm">
                            {% csrf_token %}
                            
                            <!-- Nombre Completo -->
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre Completo <span class="text-danger">*</span>:</label>
                                {{ form.nombre }}
                            </div>
                            
                            <!-- Apellidos -->
                            <div class="mb-3">
                                <label for="apellidos" class="form-label">Apellidos <span class="text-danger">*</span>:</label>
                                {{ form.apellidos }}
                            </div>
                            
                            <!-- Correo Electrónico -->
                            <div class="mb-3">
                                <label for="correo" class="form-label">Correo Electrónico <span class="text-danger">*</span>:</label>
                                {{ form.correo }}
                            </div>
                            
                            <!-- Número de Teléfono -->
                            <div class="mb-3">
                                <label for="telefono" class="form-label">Número de Teléfono <span class="text-danger">*</span>:</label>
                                {{ form.telefono }}
                            </div>
                            
                            <!-- Nivel Académico -->
                            <div class="mb-3">
                                <label for="nivel_academico" class="form-label">Nivel Académico <span class="text-danger">*</span>:</label>
                                {{ form.nivel_academico }}
                            </div>
                            
                            <!-- Título Obtenido -->
                            <div class="mb-3">
                                <label for="titulo_obtenido" class="form-label">Título Obtenido <span class="text-danger">*</span>:</label>
                                {{ form.titulo_obtenido }}
                            </div>
                            
                            <!-- Institución -->
                            <div class="mb-3">
                                <label for="institucion" class="form-label">Institución <span class="text-danger">*</span>:</label>
                                {{ form.institucion }}
                            </div>
                            
                            <!-- Rol al que Aplica -->
                            <div class="mb-3">
                                <label for="rol_aplica" class="form-label">Rol al que Aplica <span class="text-danger">*</span>:</label>
                                {{ form.rol_aplica }}
                            </div>
                            
                            <!-- Certificado Académico -->
                            <div class="mb-3">
                                <label for="certificado" class="form-label">Certificado Académico (PDF):</label>
                                {{ form.certificado }}
                            </div>
                            
                            <!-- Botón de Envío -->
                            <div class="mb-3 text-center">
                                <button type="submit" class="btn btn-primary">Enviar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS (si lo necesitas) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
